<!DOCTYPE html>
<html>
  <head>
    <title></title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Oswald:wght@200..700&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="header">
      <p>Price-Wise</p>
    </div>
    <div class="container">
    <h2 class="name_here">Budget Selector</h2>

    <div class="bar">
      <select id="currency">
        <option value="$USD">$ USD</option>
        <option value="₹INR">&#8377 INR</option>
        <option value="€EUR">&#8364 EUR</option>
      </select>
      <button id="themeToggle">&#127769</button>
    </div>
    
    <div class="price-container">
      <div class="price-input">
        <div class="price-field">
        <div>
          <span>Minimum Price</span>
          <div class="input-wrap">
            <span id="min-symbol">$</span> <input type="text" id="min-input" class="min-input" value="2500">
          </div>
        </div>
        <div>
          <span>Maximum Price</span>
          <div class="input-wrap">
            <span id="max-symbol">$</span> <input type="text" id="max-input" class="max-input" value="8500">
          </div>
        </div>
        </div>
      </div>
    </div>

    <div class="slider">
      <div class="price-slider"></div>
    </div>

    <div class="range">
      <div class="progress"></div>
      <input type="range" id="min-range" min="0" max="10000" value="2500">
      <input type="range" id="max-range" min="0" max="10000" value="8500">
    </div>

    <script src="script.js"></script>
    </div>
  </body>
</html>
